name: task_manager_test
description: Production-ready Task Manager application built with Clean Architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Networking
  dio: ^5.8.0+1

  # Dependency injection
  get_it: ^8.0.3

  # Serialization
  json_annotation: ^4.9.0

  # Local storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

fonts:
- family: Inter
  fonts:
  - asset: assets/fonts/Inter-Bold.ttf
    weight: 700
  - asset: assets/fonts/Inter-Medium.ttf
    weight: 500
  - asset: assets/fonts/Inter-SemiBold.ttf
    weight: 600
  - asset: assets/fonts/Inter-Regular.ttf
    weight: 400
